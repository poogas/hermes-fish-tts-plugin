tts:
  provider: fish
  fish:
    model: s2-pro
    reference_id: your_fish_reference_id_here
    language: ru
    style: conversational
    prefer_voice_bubble: true
    api_key_env: FISH_AUDIO_API_KEY
    latency: normal
    format: mp3
    temperature: 0.35
    top_p: 0.7
    chunk_length: 120
    prosody:
      speed: 0.94
      volume: 0

# Alternative styles:
# style: soft
# style: playful
# style: assistant
# style: cold
# style: dramatic

# Emotional instruction: static prefix prepended to every utterance for S2-Pro
# Examples:
#   emotion_instruction: "[sarcastic]"
#   emotion_instruction: "Скажи это с лёгкой иронией и усмешкой"
#   emotion_instruction: "[excited] Восторг! [laugh] Ха! Невероятно!"
# emotion_instruction: "[playful]"

# Note: the plugin also auto-injects tags like [pause], [excited], [laugh], [sigh]
# from punctuation/interjection patterns in the message text automatically.

# Custom emotion tag rules: map regex patterns to Fish emotion tags.
# Custom rules run BEFORE built-in ones, so you can extend defaults.
# emotion_tags:
#   enabled: true
#   custom:
#     - pattern: "(кхе-хи)"
#       tag: "[giggle]"
#     - pattern: "(мда+|нуу+)"
#       tag: "[sigh]"
